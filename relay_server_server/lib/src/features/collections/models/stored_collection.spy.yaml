# One row per user collection. Used by CollectionRepository and workspace assembly.
class: StoredCollection
table: stored_collection
fields:
  userId: int
  collectionId: String
  name: String
  description: String
  createdAt: DateTime
  updatedAt: DateTime
indexes:
  stored_collection_user_id_collection_id_idx:
    fields: userId, collectionId
    unique: true
