# API request definition. Aligned with Röle ApiRequestModel.
# method, bodyType, authType stored as String (e.g. get, post, raw, bearer).
class: ApiRequestModel
fields:
  id: String
  name: String
  method: String
  urlTemplate: String
  headers: Map<String, String>
  queryParams: Map<String, String>
  body: String?
  bodyType: String
  formDataFields: Map<String, String>
  authType: String
  authConfig: Map<String, String>
  description: String?
  filePath: String?
  collectionId: String
  environmentName: String?
  createdAt: DateTime
  updatedAt: DateTime
