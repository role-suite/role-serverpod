# One row per request (belongs to a collection). Used by RequestRepository.
class: StoredRequest
table: stored_request
fields:
  userId: int
  collectionId: String
  requestId: String
  data: ApiRequestModel
  createdAt: DateTime
  updatedAt: DateTime
indexes:
  stored_request_user_collection_idx:
    fields: userId, collectionId
  stored_request_user_request_idx:
    fields: userId, requestId
    unique: true
